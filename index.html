<html lang="ru">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            font-family: 'Inter', 'Quicksand', sans-serif;
            color: #1f4f3c;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* Дополнительный слой с цветочным узором */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path fill="%23ffb347" d="M50,15 L55,35 L75,40 L55,45 L50,65 L45,45 L25,40 L45,35 Z"/><circle cx="50" cy="40" r="4" fill="%23ffd700"/></svg>');
            background-repeat: repeat;
            background-size: 60px;
            z-index: 0;
        }
        .floating-petal, .floating-butterfly {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: floatPetal linear infinite;
        }
        .floating-butterfly {
            font-size: 1.6rem;
            opacity: 0.6;
            animation-duration: 14s;
        }
        @keyframes floatPetal {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 252, 240, 0.82);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            padding: 1.8rem 2rem 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 250, 210, 0.7);
            border: 1px solid #fff3cf;
            position: relative;
            z-index: 2;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            border-bottom: 2px solid #ffcf9a;
            padding-bottom: 1rem;
        }
        .badge-icon {
            background: linear-gradient(145deg, #fff0db, #ffe2bd);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            border: 2px solid #ffb669;
            color: #e68a2e;
        }
        .title-section h1 {
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(125deg, #2c8a5e, #e68a2e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .title-section p {
            font-size: 0.9rem;
            color: #4a7b64;
            font-weight: 500;
            margin-top: 4px;
        }
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 1rem;
            margin-bottom: 2.8rem;
        }
        .lspd-btn {
            background: #fffcf0;
            border: 1px solid #ffe1b9;
            border-radius: 2.2rem;
            padding: 0.8rem 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2d5e48;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .lspd-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,150,0.4), transparent);
            transition: left 0.5s;
        }
        .lspd-btn:hover::before { left: 100%; }
        .lspd-btn i { color: #f09c3c; transition: transform 0.2s; }
        .lspd-btn:hover {
            background: #fffae8;
            border-color: #ffbc6e;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
        }
        .lspd-btn:hover i { transform: scale(1.1) rotate(5deg); color: #d97a1c; }
        .info-panel {
            background: rgba(255, 253, 245, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border-left: 8px solid #ffb15e;
            padding: 1.6rem 2rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }
        .info-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px dashed #ffcf9a;
            padding-bottom: 0.6rem;
            color: #3f6b58;
        }
        .info-title i { color: #f39c42; font-size: 1.7rem; }
        .info-content {
            font-size: 1rem;
            line-height: 1.55;
            color: #2b4a3c;
        }
        .binder-buttons, .pd-form-group { display: flex; flex-wrap: wrap; gap: 0.8rem; margin: 1rem 0; }
        .binder-btn, .create-btn, .wheel-btn {
            background: #fff0df;
            border: 1px solid #ffd8ae;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #4a6b5a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .binder-btn i, .create-btn i { color: #e68a2e; }
        .binder-btn:hover, .create-btn:hover {
            background: #ffe3ca;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .warning-badge {
            background: #ffecb3;
            color: #bd7a2e;
            font-size: 0.7rem;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
            margin-left: 0.5rem;
        }
        .video-link, .google-form-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #e6f4ea;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            color: #2c6e4f;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        .video-link:hover, .google-form-link:hover { background: #cfe6d8; transform: scale(1.02); }
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }
        .prize-result {
            background: #f7efdd;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            text-align: center;
            font-weight: 600;
            border: 1px solid #ffce9a;
            color: #bd7a2e;
        }
        .small-note { font-size: 0.75rem; color: #6c8d7a; margin-top: 0.5rem; }
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6b8a77;
            border-top: 1px solid #e6d5ba;
            padding-top: 1.5rem;
        }
        @media (max-width: 650px) {
            body { padding: 1rem; }
            .container { padding: 1rem; }
            .buttons-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .pd-form-group label { width: 100%; }
        }
        hr { margin: 1rem 0; border-color: #ffe0bb; }
        .pd-form-group label { width: 200px; font-weight: 600; }
        .pd-form-group input, .pd-form-group textarea { flex: 1; padding: 0.5rem; border-radius: 1rem; border: 1px solid #ffd8ae; background: #fffef7; }

        .result-box { background: #f7efdd; border-radius: 1.5rem; padding: 1rem; margin-top: 1rem; white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; border: 1px solid #ffce9a; max-height: 400px; overflow: auto; }
        .rules-text { background: #fff6e8; padding: 0.8rem; border-radius: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #e68a2e; }
        .leadership-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .leader-card {

            width: 240px;

        }

        .avatar { font-size: 4rem; margin-bottom: 0.5rem; }

        .leader-post { font-size: 0.8rem; color: #bd7a2e; margin: 0.3rem 0; }
        .vk-link {
            display: inline-block;

            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;

        .sun-ray {

            top: -20%;
            left: -20%;

            height: 140%;
            background: radial-gradient(circle at 30% 40%, rgba(255,235,150,0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
